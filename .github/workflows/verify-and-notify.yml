name: Verify Sources and Notify

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'data/**/*.json'

env:
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  ADMIN_EMAIL: info@diasporaai.dev

jobs:
  verify-government-sources:
    runs-on: ubuntu-latest
    outputs:
      verification_passed: ${{ steps.verify.outputs.passed }}
      contributor_info: ${{ steps.verify.outputs.contributor_info }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > changed_files.txt
          cat changed_files.txt

      - name: Verify Government Sources
        id: verify
        run: |
          echo "🔍 Verifying government source URLs..."
          
          VERIFIED_COUNT=0
          FAILED_COUNT=0
          VERIFICATION_RESULTS=""
          FAILED_SOURCES=""
          
          # Known government domain patterns
          GOV_PATTERNS=(
            "\.gov$"
            "\.gov\.[a-z]{2}$"
            "\.gouv\."
            "\.gob\."
            "\.gc\.ca"
            "\.europa\.eu"
            "embassy"
            "consulate"
            "migration\."
            "immigration\."
            "homeaffairs\."
            "auswaertiges-amt"
            "diplomatie\."
            "minex\."
            "mfa\."
            "mofa\."
          )
          
          while IFS= read -r file; do
            if [[ "$file" == data/*.json ]]; then
              echo "Checking: $file"
              
              # Extract source URLs from the file
              SOURCES=$(jq -r '
                .. | objects | 
                select(.source? != null) | 
                .source | 
                select(.url? != null) | 
                {url: .url, governmentDomain: .governmentDomain}
              ' "$file" 2>/dev/null || echo "")
              
              if [ -n "$SOURCES" ]; then
                while IFS= read -r source_json; do
                  if [ -n "$source_json" ]; then
                    URL=$(echo "$source_json" | jq -r '.url // empty')
                    GOV_FLAG=$(echo "$source_json" | jq -r '.governmentDomain // false')
                    
                    if [ -n "$URL" ]; then
                      # Extract domain from URL
                      DOMAIN=$(echo "$URL" | sed -E 's|https?://([^/]+).*|\1|' | tr '[:upper:]' '[:lower:]')
                      
                      IS_GOV=false
                      for pattern in "${GOV_PATTERNS[@]}"; do
                        if echo "$DOMAIN" | grep -qE "$pattern"; then
                          IS_GOV=true
                          break
                        fi
                      done
                      
                      # Try to verify URL is accessible
                      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$URL" 2>/dev/null || echo "000")
                      
                      if [ "$IS_GOV" = true ] && [ "$HTTP_CODE" != "000" ] && [ "$HTTP_CODE" -lt 400 ]; then
                        echo "✅ VERIFIED: $URL (HTTP $HTTP_CODE)"
                        VERIFIED_COUNT=$((VERIFIED_COUNT + 1))
                        VERIFICATION_RESULTS="${VERIFICATION_RESULTS}✅ $URL\n"
                      elif [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" -ge 400 ]; then
                        echo "⚠️ UNREACHABLE: $URL (HTTP $HTTP_CODE)"
                        FAILED_COUNT=$((FAILED_COUNT + 1))
                        FAILED_SOURCES="${FAILED_SOURCES}⚠️ Unreachable: $URL (HTTP $HTTP_CODE)\n"
                      elif [ "$IS_GOV" = false ]; then
                        echo "❌ NOT GOV DOMAIN: $URL"
                        FAILED_COUNT=$((FAILED_COUNT + 1))
                        FAILED_SOURCES="${FAILED_SOURCES}❌ Not government domain: $URL\n"
                      fi
                    fi
                  fi
                done <<< "$SOURCES"
              fi
            fi
          done < changed_files.txt
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "VERIFICATION SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Verified: $VERIFIED_COUNT"
          echo "❌ Failed: $FAILED_COUNT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Get contributor info
          CONTRIBUTOR="${{ github.event.pull_request.user.login }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          FORK_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          
          # Determine if verification passed
          if [ "$VERIFIED_COUNT" -gt 0 ] && [ "$FAILED_COUNT" -eq 0 ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "🎉 All sources verified!"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "❌ Verification failed - some sources could not be verified"
          fi
          
          # Save contributor info for email
          CONTRIBUTOR_INFO=$(cat << EOF
          {
            "contributor": "$CONTRIBUTOR",
            "pr_number": $PR_NUMBER,
            "pr_title": "$PR_TITLE",
            "pr_url": "$PR_URL",
            "fork_repo": "$FORK_REPO",
            "verified_count": $VERIFIED_COUNT,
            "failed_count": $FAILED_COUNT,
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
          )
          
          # Escape for GitHub output
          echo "contributor_info<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTRIBUTOR_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post verification comment
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.verify.outputs.passed }}' === 'true';
            const info = JSON.parse(`${{ steps.verify.outputs.contributor_info }}`);
            
            let body;
            if (passed) {
              body = `
            ## ✅ Source Verification Passed
            
            All government source URLs have been verified.
            
            | Metric | Value |
            |--------|-------|
            | Sources Verified | ${info.verified_count} |
            | Sources Failed | ${info.failed_count} |
            | Contributor | @${info.contributor} |
            | Fork | ${info.fork_repo} |
            
            ---
            
            ### 💰 Bounty Payment Instructions
            
            Your contribution has been **verified**! To receive your bounty payment:
            
            1. **Send an email to:** \`info@diasporaai.dev\`
            2. **Subject:** \`Bounty Payment - PR #${info.pr_number}\`
            3. **Include in email:**
               - Your GitHub username: \`${info.contributor}\`
               - PR number: \`#${info.pr_number}\`
               - Fork repository: \`${info.fork_repo}\`
               - Payment method preference (PayPal, Wise, or bank transfer)
               - Payment details (email for PayPal/Wise, or bank details)
            
            ⏱️ **Timeline:** Payments are processed within 3-5 business days after verification.
            
            ---
            *Automated verification by Diaspora Visa Data CI*
            `;
            } else {
              body = `
            ## ❌ Source Verification Failed
            
            Some sources could not be verified. Please check the following:
            
            | Metric | Value |
            |--------|-------|
            | Sources Verified | ${info.verified_count} |
            | Sources Failed | ${info.failed_count} |
            
            ### Common Issues:
            
            1. **URL not from government domain** - Must use official .gov, .gov.uk, embassy, or immigration authority websites
            2. **URL unreachable** - The source URL returned an error or timeout
            3. **Missing governmentDomain flag** - Set \`"governmentDomain": true\` in your source object
            
            ### How to Fix:
            
            1. Update your source URLs to point to official government websites
            2. Ensure all URLs are accessible
            3. Re-push your changes
            
            ---
            *Automated verification by Diaspora Visa Data CI*
            `;
            }
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  notify-admin:
    needs: verify-government-sources
    if: needs.verify-government-sources.outputs.verification_passed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Send verification email to admin
        run: |
          INFO='${{ needs.verify-government-sources.outputs.contributor_info }}'
          
          CONTRIBUTOR=$(echo "$INFO" | jq -r '.contributor')
          PR_NUMBER=$(echo "$INFO" | jq -r '.pr_number')
          PR_TITLE=$(echo "$INFO" | jq -r '.pr_title')
          PR_URL=$(echo "$INFO" | jq -r '.pr_url')
          FORK_REPO=$(echo "$INFO" | jq -r '.fork_repo')
          VERIFIED_COUNT=$(echo "$INFO" | jq -r '.verified_count')
          TIMESTAMP=$(echo "$INFO" | jq -r '.timestamp')
          
          # Send email via Resend API
          curl -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Diaspora Visa Data <noreply@diasporaai.dev>\",
              \"to\": \"$ADMIN_EMAIL\",
              \"subject\": \"✅ Verified Contribution - PR #$PR_NUMBER by $CONTRIBUTOR\",
              \"html\": \"<div style='font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;'><h2 style='color: #22c55e;'>✅ Source Verification Passed</h2><p>A contributor's submission has been verified and is ready for review.</p><table style='width: 100%; border-collapse: collapse; margin: 20px 0;'><tr style='background: #f3f4f6;'><td style='padding: 12px; border: 1px solid #e5e7eb; font-weight: bold;'>Contributor</td><td style='padding: 12px; border: 1px solid #e5e7eb;'>$CONTRIBUTOR</td></tr><tr><td style='padding: 12px; border: 1px solid #e5e7eb; font-weight: bold;'>PR Number</td><td style='padding: 12px; border: 1px solid #e5e7eb;'>#$PR_NUMBER</td></tr><tr style='background: #f3f4f6;'><td style='padding: 12px; border: 1px solid #e5e7eb; font-weight: bold;'>PR Title</td><td style='padding: 12px; border: 1px solid #e5e7eb;'>$PR_TITLE</td></tr><tr><td style='padding: 12px; border: 1px solid #e5e7eb; font-weight: bold;'>Fork Repository</td><td style='padding: 12px; border: 1px solid #e5e7eb;'>$FORK_REPO</td></tr><tr style='background: #f3f4f6;'><td style='padding: 12px; border: 1px solid #e5e7eb; font-weight: bold;'>Sources Verified</td><td style='padding: 12px; border: 1px solid #e5e7eb;'>$VERIFIED_COUNT</td></tr><tr><td style='padding: 12px; border: 1px solid #e5e7eb; font-weight: bold;'>Verified At</td><td style='padding: 12px; border: 1px solid #e5e7eb;'>$TIMESTAMP</td></tr></table><p><a href='$PR_URL' style='display: inline-block; background: #3b82f6; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px;'>View Pull Request</a></p><hr style='margin: 30px 0; border: none; border-top: 1px solid #e5e7eb;'/><h3>📋 Verification Checklist</h3><p>When the contributor emails for payment, verify:</p><ul><li>GitHub username matches: <strong>$CONTRIBUTOR</strong></li><li>PR number matches: <strong>#$PR_NUMBER</strong></li><li>Fork repo matches: <strong>$FORK_REPO</strong></li></ul><p style='color: #6b7280; font-size: 12px;'>This is an automated notification from Diaspora Visa Data CI.</p></div>\"
            }"
          
          echo "📧 Admin notification email sent!"

      - name: Add verified label
        uses: actions/github-script@v7
        with:
          script: |
            // Add verified label to PR
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.pull_request.number }},
                labels: ['verified', 'bounty-eligible', 'awaiting-payment']
              });
            } catch (e) {
              console.log('Could not add labels:', e.message);
            }
